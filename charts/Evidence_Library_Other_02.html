
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Other Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .chart-container { width: 800px; height: 500px; margin-bottom: 50px; }
    </style>
</head>
<body>
    <h1>Other Analysis</h1>
    <div id="main" class="chart-container"></div>
    <div id="scatter" class="chart-container"></div>
    
    <script>
        const data = [{"id":"CISCER clinical trial data.md","title":"CISCER: Clinical trial data","year":2026,"scene":"Other","sensitivity":89.6,"specificity":96.5,"auc":0,"sampleSize":1968,"referralReduction":0}];
        
        // Bar Chart
        const chartDom = document.getElementById('main');
        const myChart = echarts.init(chartDom);
        const option = {
            title: { text: 'Other - Performance Metrics' },
            tooltip: { trigger: 'axis' },
            legend: { data: ['Sensitivity', 'Specificity'] },
            xAxis: { 
                type: 'category', 
                data: data.map(d => d.id.substring(0, 10) + '...'),
                axisLabel: { interval: 0, rotate: 30 }
            },
            yAxis: { type: 'value', max: 100 },
            series: [
                {
                    name: 'Sensitivity',
                    type: 'bar',
                    data: data.map(d => d.sensitivity),
                    itemStyle: { color: '#0d9488' }
                },
                {
                    name: 'Specificity',
                    type: 'bar',
                    data: data.map(d => d.specificity),
                    itemStyle: { color: '#94a3b8' }
                }
            ]
        };
        myChart.setOption(option);

        // Scatter Chart (AUC vs Sample Size)
        const scatterDom = document.getElementById('scatter');
        const scatterChart = echarts.init(scatterDom);
        const scatterOption = {
            title: { text: 'Other - AUC vs Sample Size' },
            tooltip: {
                formatter: function (param) {
                    return param.data[2];
                }
            },
            xAxis: { type: 'value', name: 'Sample Size', scale: true },
            yAxis: { type: 'value', name: 'AUC', min: 0.5, max: 1 },
            series: [{
                symbolSize: 20,
                data: data.map(d => [d.sampleSize, d.auc, d.title]),
                type: 'scatter',
                itemStyle: { color: '#7c3aed' }
            }]
        };
        scatterChart.setOption(scatterOption);
    </script>
</body>
</html>
